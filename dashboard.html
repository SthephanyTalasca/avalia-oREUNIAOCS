<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Avaliações - Nibo Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 2.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .stat-box { text-align: center; padding: 2rem; }
    </style>
</head>
<body class="pb-20">

<nav class="bg-[#002d72] text-white py-4 px-8 sticky top-0 z-50 shadow-xl">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-3">
            <i data-lucide="bar-chart-3" class="text-blue-400 w-6 h-6"></i>
            <h1 class="font-extrabold text-lg uppercase">Nibo <span class="text-blue-400">Dashboard</span></h1>
        </div>
        <a href="/" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-bold transition-all">
            ← Voltar para Análise
        </a>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 mt-8">

    <!-- FILTROS -->
    <div class="glass-card p-6 mb-8">
        <h2 class="font-bold text-lg mb-4 flex items-center gap-2">
            <i data-lucide="filter" class="w-5 h-5"></i>
            Filtros
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="text-sm font-bold text-slate-600 block mb-2">Período</label>
                <select id="periodo-filter" class="w-full p-2 border border-slate-200 rounded-lg">
                    <option value="0">Todas as datas</option>
                    <option value="7">Últimos 7 dias</option>
                    <option value="30">Últimos 30 dias</option>
                    <option value="90">Últimos 90 dias</option>
                </select>
            </div>
            <div>
                <label class="text-sm font-bold text-slate-600 block mb-2">Coordenador</label>
                <select id="coordenador-filter" class="w-full p-2 border border-slate-200 rounded-lg">
                    <option value="">Todos</option>
                </select>
            </div>
            <div>
                <label class="text-sm font-bold text-slate-600 block mb-2">Analista</label>
                <input type="text" id="analista-filter" placeholder="Nome do analista" class="w-full p-2 border border-slate-200 rounded-lg">
            </div>
            <div class="flex items-end">
                <button id="btn-aplicar" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition-all">
                    Aplicar Filtros
                </button>
            </div>
        </div>
    </div>

    <!-- ESTATÍSTICAS RÁPIDAS -->
    <div id="stats-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <!-- Cards carregadas dinamicamente -->
    </div>

    <!-- TABELA DE AVALIAÇÕES -->
    <div class="glass-card p-8">
        <h2 class="font-bold text-lg mb-6 flex items-center gap-2">
            <i data-lucide="list" class="w-5 h-5"></i>
            Histórico de Avaliações
        </h2>
        
        <div id="loading-table" class="text-center py-8">
            <p class="text-slate-500">Carregando avaliações...</p>
        </div>

        <div id="table-container" class="hidden overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-slate-50 border-b">
                    <tr>
                        <th class="px-4 py-3 text-left font-bold">Analista</th>
                        <th class="px-4 py-3 text-left font-bold">Coordenador</th>
                        <th class="px-4 py-3 text-center font-bold">Média CS</th>
                        <th class="px-4 py-3 text-left font-bold">Saúde</th>
                        <th class="px-4 py-3 text-left font-bold">Churn</th>
                        <th class="px-4 py-3 text-left font-bold">Data</th>
                        <th class="px-4 py-3 text-center font-bold">Ações</th>
                    </tr>
                </thead>
                <tbody id="tbody-avaliações">
                    <!-- Linhas carregadas dinamicamente -->
                </tbody>
            </table>
        </div>

        <div id="empty-state" class="text-center py-8">
            <i data-lucide="inbox" class="w-12 h-12 text-slate-300 mx-auto mb-3"></i>
            <p class="text-slate-500">Nenhuma avaliação encontrada</p>
        </div>
    </div>

    <!-- GRÁFICO DE PILARES -->
    <div class="glass-card p-8 mt-8">
        <h2 class="font-bold text-lg mb-6">Desempenho Médio por Pilar</h2>
        <div class="flex items-center justify-center" style="height: 400px;">
            <canvas id="pilaresChart"></canvas>
        </div>
    </div>

</main>

<script>
    lucide.createIcons();

    let allReunioes = [];
    let statsData = null;

    // Carrega dados da API
    async function loadDashboard() {
        try {
            const periodo = document.getElementById('periodo-filter').value;
            const coordenador = document.getElementById('coordenador-filter').value;
            const analista = document.getElementById('analista-filter').value;

            const params = new URLSearchParams();
            if (periodo !== '0') params.append('periodo', periodo);
            if (coordenador) params.append('coordenador', coordenador);
            if (analista) params.append('analista', analista);

            const response = await fetch('/api/dashboard.js?' + params.toString());
            if (!response.ok) throw new Error('Erro ao carregar dados');

            const data = await response.json();
            allReunioes = data.reunioes || [];
            statsData = data.stats || {};

            renderStats();
            renderTable();
            renderChart();
            loadCoordinators();

        } catch (error) {
            console.error('❌ Erro:', error);
            document.getElementById('loading-table').innerHTML = 
                '<p class="text-red-500 font-bold">Erro ao carregar dados: ' + error.message + '</p>';
        }
    }

    // Renderiza cards de estatísticas
    function renderStats() {
        const container = document.getElementById('stats-container');
        
        if (!statsData) {
            container.innerHTML = '';
            return;
        }

        const cards = [
            { label: 'Total de Avaliações', value: statsData.total || 0, icon: 'file-text', color: 'blue' },
            { label: 'Média Geral', value: (statsData.media_geral || 0).toFixed(1) + '/5', icon: 'trending-up', color: 'green' },
            { label: 'Alto Risco de Churn', value: statsData.churnStats?.alto || 0, icon: 'alert-circle', color: 'red' },
            { label: 'Clientes Saudáveis', value: statsData.saudeStats?.saudavel || 0, icon: 'heart', color: 'emerald' },
        ];

        container.innerHTML = cards.map(card => `
            <div class="glass-card stat-box bg-gradient-to-br from-${card.color}-50 to-white border-l-4 border-${card.color}-500">
                <i data-lucide="${card.icon}" class="w-8 h-8 text-${card.color}-600 mx-auto mb-3"></i>
                <div class="text-3xl font-bold text-${card.color}-700 mb-1">${card.value}</div>
                <div class="text-sm text-slate-600">${card.label}</div>
            </div>
        `).join('');

        lucide.createIcons();
    }

    // Renderiza tabela
    function renderTable() {
        const tbody = document.getElementById('tbody-avaliações');
        const loadingEl = document.getElementById('loading-table');
        const tableEl = document.getElementById('table-container');
        const emptyEl = document.getElementById('empty-state');

        loadingEl.classList.add('hidden');

        if (allReunioes.length === 0) {
            tableEl.classList.add('hidden');
            emptyEl.classList.remove('hidden');
            return;
        }

        tableEl.classList.remove('hidden');
        emptyEl.classList.add('hidden');

        tbody.innerHTML = allReunioes.map(r => `
            <tr class="border-b hover:bg-slate-50 transition-colors">
                <td class="px-4 py-3 font-semibold">${r.analista_nome || '—'}</td>
                <td class="px-4 py-3">${r.coordenador || '—'}</td>
                <td class="px-4 py-3 text-center">
                    <span class="px-3 py-1 bg-blue-100 text-blue-700 font-bold rounded-lg">${(r.media_final || 0).toFixed(1)}</span>
                </td>
                <td class="px-4 py-3 text-sm">${r.saude_cliente || '—'}</td>
                <td class="px-4 py-3 text-sm">${r.risco_churn || '—'}</td>
                <td class="px-4 py-3 text-sm text-slate-500">${new Date(r.created_at).toLocaleDateString('pt-BR')}</td>
                <td class="px-4 py-3 text-center">
                    <button onclick="viewDetails(${r.id})" class="px-2 py-1 bg-blue-500 hover:bg-blue-600 text-white text-xs rounded transition-all">
                        Ver
                    </button>
                </td>
            </tr>
        `).join('');
    }

    // Renderiza gráfico de pilares
    function renderChart() {
        if (!statsData || !statsData.pilaresTime) return;

        const ctx = document.getElementById('pilaresChart').getContext('2d');
        
        const labels = [
            'Consultividade', 'Escuta Ativa', 'Jornada', 'Encantamento', 'Objeções',
            'Rapport', 'Autoridade', 'Postura', 'Gestão Tempo', 'Contextualização',
            'Clareza', 'Objetividade', 'Flexibilidade', 'Dom. Produto', 'Dom. Negócio',
            'Ecossistema', 'Univ. Contábil'
        ];

        const dados = [
            statsData.pilaresTime.consultividade,
            statsData.pilaresTime.escuta_ativa,
            statsData.pilaresTime.jornada_cliente,
            statsData.pilaresTime.encantamento,
            statsData.pilaresTime.objecoes,
            statsData.pilaresTime.rapport,
            statsData.pilaresTime.autoridade,
            statsData.pilaresTime.postura,
            statsData.pilaresTime.gestao_tempo,
            statsData.pilaresTime.contextualizacao,
            statsData.pilaresTime.clareza,
            statsData.pilaresTime.objetividade,
            statsData.pilaresTime.flexibilidade,
            statsData.pilaresTime.dominio_produto,
            statsData.pilaresTime.dominio_negocio,
            statsData.pilaresTime.ecossistema_nibo,
            statsData.pilaresTime.universo_contabil,
        ];

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Nota Média',
                    data: dados,
                    backgroundColor: 'rgba(37, 99, 235, 0.8)',
                    borderColor: '#1e3a8a',
                    borderWidth: 1
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: { beginAtZero: true, max: 5 }
                }
            }
        });
    }

    // Carrega coordenadores no select
    async function loadCoordinators() {
        try {
            const response = await fetch('/api/coordinators.js');
            if (!response.ok) return;
            
            const coords = await response.json();
            const select = document.getElementById('coordenador-filter');
            select.innerHTML = '<option value="">Todos</option>';
            
            coords.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.nome;
                opt.textContent = c.nome;
                select.appendChild(opt);
            });
        } catch (error) {
            console.error('Erro ao carregar coordenadores:', error);
        }
    }

    // Event listeners
    document.getElementById('btn-aplicar').addEventListener('click', loadDashboard);

    // Carrega ao abrir a página
    loadDashboard();
</script>

</body>
</html>
